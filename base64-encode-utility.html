<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder Utility</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; }
        button:hover { background: #005a9e; }
        .result-box { background: #f4f4f4; padding: 15px; border-radius: 4px; border: 1px solid #ccc; min-height: 50px; word-wrap: break-word; }
    </style>
</head>
<body>

    <h2>Base64 Tool</h2>
    
    <label for="inputString">Enter Text:</label>
    <textarea id="inputString" placeholder="Type something here..."></textarea>

    <div class="controls">
        <button onclick="handleEncode()">Encode to Base64</button>
    </div>

    <strong>Output:</strong>
    <div id="output" class="result-box">Result will appear here...</div>

    <script>
        // Method 1: Encode String to Base64
        function encodeBase64(str) {
            try {
                return btoa(unescape(encodeURIComponent(str)));
            } catch (e) {
                return "Error: Could not encode string.";
            }
        }

        // UI Logic to show strings on page
        function handleEncode() {
            const input = document.getElementById('inputString').value;
            const result = encodeBase64(input);
            document.getElementById('output').innerText = result;
        }
    </script>

</body>
</html>
